<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky Notes</title>

    <!-- css file -->
    <link rel="stylesheet" href="./style.css">

    <!-- bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <!-- font family -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">

</head>
<body>
    
    <div class="main-container">
        <!-- 
        create sticky notes button container 
        -->
        <div class="createNotes">
            <button id="createNote" class="btn btn-warning">Create Note</button>
        </div>

        <!--
         all sticky notes collections
        -->
        <div id="container2" class="container2">
        </div>

        <!-- 
        add new sticky notes 
        -->
        <div id="container3" class="container3">
            <form>
                <!-- write notes -->
                <textarea id="noteText" placeholder="Write Note..." maxlength="90"></textarea>

                <!-- check button -->
                <i id="checkBtn" class="bi bi-check-circle"></i>

                <!-- cross button -->
                <i id="crossBtn" class="bi bi-x-circle"></i>

            </form>
        </div>

    </div>


    <!-- js file -->
    <script src="./script.js"></script>
</body>
</html>
